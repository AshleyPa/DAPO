name: Build DAPO Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true
        default: dapo-v2-latest

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ashleypa/dapo

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            file: backend/Dockerfile
            image: dapo-backend
          - name: user-web
            context: frontend
            file: frontend/apps/user/Dockerfile
            image: dapo-user-web
          - name: admin-web
            context: frontend
            file: frontend/apps/admin/Dockerfile
            image: dapo-admin-web
          - name: gateway
            context: frontend
            file: frontend/apps/gateway/Dockerfile
            image: dapo-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.run_id }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ inputs.image_tag }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
